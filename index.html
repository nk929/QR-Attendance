    <!-- 관리자 기능 -->
    <script>
    async function resetAllUsers() {
        const password = prompt('비밀번호를 입력하세요:');
        if (password !== 'admin1234') {
            alert('❌ 비밀번호가 올바르지 않습니다!');
            return;
        }
        
        if (!confirm('정말로 모든 사용자를 삭제하시겠습니까?\n\n⚠️ 이 작업은 되돌릴 수 없습니다!')) return;
        if (!confirm('최종 확인: 모든 사용자 데이터가 영구 삭제됩니다!')) return;
        
        try {
            const snapshot = await db.collection('users').get();
            console.log(`🗑️ 총 ${snapshot.size}명의 사용자 삭제 시작...`);
            
            for (const doc of snapshot.docs) {
                await doc.ref.delete();
            }
            
            alert(`✅ ${snapshot.size}명의 사용자가 삭제되었습니다.`);
            location.reload();
        } catch (error) {
            console.error('❌ 삭제 실패:', error);
            alert('삭제 실패: ' + error.message);
        }
    }
    
    async function resetAllAttendance() {
        const password = prompt('비밀번호를 입력하세요:');
        if (password !== 'admin1234') {
            alert('❌ 비밀번호가 올바르지 않습니다!');
            return;
        }
        
        if (!confirm('정말로 모든 출석 기록을 삭제하시겠습니까?')) return;
        
        try {
            const snapshot = await db.collection('attendance').get();
            console.log(`🗑️ 총 ${snapshot.size}건의 출석 기록 삭제 시작...`);
            
            for (const doc of snapshot.docs) {
                await doc.ref.delete();
            }
            
            alert(`✅ ${snapshot.size}건의 출석 기록이 삭제되었습니다.`);
            location.reload();
        } catch (error) {
            console.error('❌ 삭제 실패:', error);
            alert('삭제 실패: ' + error.message);
        }
    }
    
    async function resetAllData() {
        const password = prompt('비밀번호를 입력하세요:');
        if (password !== 'admin1234') {
            alert('❌ 비밀번호가 올바르지 않습니다!');
            return;
        }
        
        if (!confirm('⚠️ 경고: 모든 데이터(사용자 + 출석)를 삭제합니다!\n\n정말 계속하시겠습니까?')) return;
        
        const confirmText = prompt('계속하려면 "DELETE"를 입력하세요:');
        if (confirmText !== 'DELETE') {
            alert('취소되었습니다.');
            return;
        }
        
        try {
            const users = await db.collection('users').get();
            const attendance = await db.collection('attendance').get();
            
            console.log(`🗑️ ${users.size}명 사용자, ${attendance.size}건 출석 기록 삭제...`);
            
            for (const doc of users.docs) await doc.ref.delete();
            for (const doc of attendance.docs) await doc.ref.delete();
            
            alert(`✅ 전체 초기화 완료!\n- 사용자: ${users.size}명\n- 출석 기록: ${attendance.size}건`);
            location.reload();
        } catch (error) {
            console.error('❌ 초기화 실패:', error);
            alert('초기화 실패: ' + error.message);
        }
    }
    </script>
